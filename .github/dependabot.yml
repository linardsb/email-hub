version: 2
updates:
  # Backend (uv / pyproject.toml at root)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Batch all minor/patch backend bumps into ONE PR per week so CI runs
      # once instead of per-package. Major bumps stay individual (human review).
      # The "-minor-patch" name is the auto-merge allowlist token — see
      # dependabot-auto-merge.yml.
      backend-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Pinned by cognee[graph] extra (cognee depends on gunicorn<24).
      # Resolver fails any major-version bump until cognee relaxes its constraint.
      - dependency-name: "gunicorn"
        update-types: ["version-update:semver-major"]
      # Pinned by cognee → fastapi-users (==0.0.20). Skip patch/minor bumps
      # so Dependabot stops attempting unsatisfiable upgrades.
      - dependency-name: "python-multipart"
      # Pinned by cognee[graph] (cognee depends on structlog<26). Resolver
      # fails any major bump, which was surfacing as a recurring "Dependabot
      # Updates" job failure. Revisit when cognee relaxes its constraint.
      - dependency-name: "structlog"
        update-types: ["version-update:semver-major"]

  # Mock ESP sidecar (pip / requirements.txt)
  - package-ecosystem: "pip"
    directory: "/services/mock-esp"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      mock-esp-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Maizzle builder sidecar (npm)
  - package-ecosystem: "npm"
    directory: "/services/maizzle-builder"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      maizzle-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # MJML 5 is a young, fast-moving major rewrite (5.0 shipped 2026-04-16;
      # alpha/beta tags still active). It changes mjml2html to async/new shape,
      # which silently breaks the sidecar's sync compileMjml (empty HTML, no
      # error) — verified via the vitest suite (PR #245, 11 failures). MJML 4.18
      # is stable and our /compile-mjml path works on it. Revisit deliberately
      # (await + output re-validation) when there is a real MJML-5 need.
      - dependency-name: "mjml"
        update-types: ["version-update:semver-major"]

  # Frontend monorepo (npm/pnpm at cms/)
  - package-ecosystem: "npm"
    directory: "/cms"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # React core must move in lockstep — bumping react alone (or react-dom
      # alone) breaks tests with "Incompatible React versions" because pnpm
      # pins each lockfile entry separately even with caret ranges.
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      # Everything else minor/patch in one weekly PR. Defined AFTER `react`
      # so react packages stay in their lockstep group (Dependabot assigns
      # each dependency to the first matching group). Non-react majors stay
      # individual. The react group has no "-minor-patch" token, so it is
      # NOT auto-merged (react majors need human review).
      cms-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
