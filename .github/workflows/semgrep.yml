name: Semgrep Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # Skip SAST on PRs that only change lockfiles or generated artifacts —
    # Semgrep analyzes source code, not third-party lib internals (Trivy +
    # GHAS dependency scanning cover dep CVEs). Saves CI on dependabot churn.
    paths-ignore:
      - "**/uv.lock"
      - "**/poetry.lock"
      - "**/Pipfile.lock"
      - "**/package-lock.json"
      - "**/pnpm-lock.yaml"
      - "**/yarn.lock"
  schedule:
    - cron: "0 6 * * 3" # Weekly Wednesday 6am UTC

# Cancel superseded scans on the same ref (e.g. Dependabot rebases) so stale
# runs don't keep burning Actions minutes. See ci.yml for rationale.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6

      # Advisory mode: findings surface in logs + SARIF artifact, but don't block CI.
      # Flip `continue-on-error` to false after the 43 open findings are triaged.
      - name: Run Semgrep
        continue-on-error: true
        run: semgrep ci --sarif --output=semgrep.sarif --exclude='docs/eval-labeling-tool.html'
        env:
          # Ruleset rationale (security coverage maintained, audit-tier
          # noise dropped):
          #   p/python, p/javascript, p/typescript — language-specific
          #     bug/security rules. Source of jwt-hardcoded-secret etc.
          #   p/nextjs, p/react — framework-specific issues.
          #   p/owasp-top-ten — direct OWASP Top 10 coverage.
          #   p/secrets — hardcoded credentials/tokens.
          #   p/default — Semgrep's curated default ruleset.
          # Removed: p/security-audit. Empirically (2026-05-09) it
          # contributed zero unique findings vs the packs above; its
          # `LOW CONFIDENCE` rules fired on test fixtures (#156) and
          # required structural-not-suppression fixes that the
          # higher-confidence packs already enforce.
          SEMGREP_RULES: >-
            p/python
            p/javascript
            p/typescript
            p/nextjs
            p/react
            p/owasp-top-ten
            p/secrets
            p/default
            ./.semgrep/rules

      # Tolerates the repo having GHAS code-scanning disabled.
      # Upload still succeeds once code-scanning is enabled in repo settings.
      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        if: always()
        with:
          sarif_file: semgrep.sarif

      - name: Upload SARIF artifact (fallback when code-scanning is disabled)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          retention-days: 14
